name: TEST INIT RESPONSE PROTOCOL

on:
  push:

permissions:
  contents: read

concurrency:
  group: test-init-response-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-init-response:
    name: Build, Test, Valgrind, Discord Notify
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Build and run tests
        id: run_build_test
        run: |
          set +e
          chmod +x ./utility_scripts/build_and_test.sh
          ./utility_scripts/build_and_test.sh 2>&1 | tee build_and_test.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run valgrind test protocol
        id: run_valgrind
        if: always()
        run: |
          set +e
          chmod +x ./utility_scripts/valgrind_tests.sh
          sudo ./utility_scripts/valgrind_tests.sh 2>&1 | tee valgrind_tests.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Ensure log files exist
        if: always()
        run: |
          [ -f build_and_test.log ] || echo "build_and_test.log was not generated" > build_and_test.log
          [ -f valgrind_tests.log ] || echo "valgrind_tests.log was not generated" > valgrind_tests.log

      - name: Install AI summary dependencies
        if: always()
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install openai

      - name: Restore cached AI overview context
        id: ai_overview_cache
        if: always() && github.event_name == 'push'
        uses: actions/cache@v4
        with:
          path: ai_context_overview.txt
          key: ai-overview-${{ runner.os }}-${{ hashFiles('README.md', '**/*description*', '**/*DESCRIPTION*') }}

      - name: Build AI context - project overview
        if: always() && github.event_name == 'push' && steps.ai_overview_cache.outputs.cache-hit != 'true'
        run: |
          python3 - <<'PY'
          from pathlib import Path

          parts = []

          readme = Path("README.md")
          if readme.exists():
              parts.append("# README.md")
              parts.append(readme.read_text(encoding="utf-8", errors="replace"))

          for path in sorted(Path(".").rglob("*")):
              if not path.is_file():
                  continue
              if "description" not in path.name.lower():
                  continue
              if ".git" in path.parts:
                  continue
              if path.name == "ai_context_overview.txt":
                  continue
              try:
                  text = path.read_text(encoding="utf-8", errors="replace")
              except Exception:
                  continue
              parts.append("")
              parts.append(f"# {path.as_posix()}")
              parts.append(text)

          Path("ai_context_overview.txt").write_text("\n".join(parts), encoding="utf-8")
          PY

      - name: Build AI context - project overview fallback
        if: always() && github.event_name == 'push'
        run: |
          [ -f ai_context_overview.txt ] || touch ai_context_overview.txt

      - name: Build AI context - commit messages
        if: always() && github.event_name == 'push'
        env:
          EVENT_PATH: ${{ github.event_path }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          max_commits = 12
          event_path = os.environ["EVENT_PATH"]
          with open(event_path, "r", encoding="utf-8") as fh:
              event = json.load(fh)

          commits = event.get("commits", [])
          lines = []
          for c in commits[:max_commits]:
              cid = (c.get("id") or "")[:7]
              msg = (c.get("message") or "").splitlines()[0].strip()
              author = (c.get("author") or {}).get("name", "unknown")
              lines.append(f"- {cid} {msg} ({author})")

          if len(commits) > max_commits:
              lines.append(f"- ... and {len(commits) - max_commits} more commit(s)")

          Path("ai_context_commits.txt").write_text("\n".join(lines), encoding="utf-8")
          PY

      - name: Build AI context - changed files
        if: always() && github.event_name == 'push'
        env:
          EVENT_PATH: ${{ github.event_path }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          event_path = os.environ["EVENT_PATH"]
          with open(event_path, "r", encoding="utf-8") as fh:
              event = json.load(fh)

          before = event.get("before", "")
          after = event.get("after", "")

          def run_git(args):
              proc = subprocess.run(["git", *args], check=False, capture_output=True, text=True)
              return proc.stdout.strip() if proc.returncode == 0 else ""

          changed_files = ""
          if before and after and before != "0" * 40:
              changed_files = run_git(["diff", "--name-status", before, after])
          if not changed_files:
              changed_files = run_git(["show", "--name-status", "--pretty=format:", "HEAD"])

          Path("ai_context_changed_files.txt").write_text(changed_files, encoding="utf-8")
          PY

      - name: Build AI context - compact diff
        if: always() && github.event_name == 'push'
        env:
          EVENT_PATH: ${{ github.event_path }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          event_path = os.environ["EVENT_PATH"]
          with open(event_path, "r", encoding="utf-8") as fh:
              event = json.load(fh)

          before = event.get("before", "")
          after = event.get("after", "")

          def run_git(args):
              proc = subprocess.run(["git", *args], check=False, capture_output=True, text=True)
              return proc.stdout.strip() if proc.returncode == 0 else ""

          diff_text = ""
          if before and after and before != "0" * 40:
              diff_text = run_git(["diff", "--unified=1", "--no-color", before, after])
          if not diff_text:
              diff_text = run_git(["show", "--unified=1", "--no-color", "--pretty=format:", "HEAD"])

          max_chars = 6000
          if len(diff_text) > max_chars:
              diff_text = diff_text[: max_chars - 20] + "\n...[truncated]"

          Path("ai_context_diff.txt").write_text(diff_text, encoding="utf-8")
          PY

      - name: Build AI context - compressed logs
        if: always() && github.event_name == 'push'
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          MAX_CHARS = 2800
          SIGNAL = re.compile(
              r"(error|failed|fail|assert|warning|segmentation fault|invalid read|definitely lost|leak)",
              re.IGNORECASE,
          )

          def read_text(path):
              p = Path(path)
              if not p.exists():
                  return ""
              return p.read_text(encoding="utf-8", errors="replace")

          def compact(name, text):
              if not text.strip():
                  return [f"[{name}] log unavailable"]

              lines = []
              seen = set()
              for line in text.splitlines():
                  clean = " ".join(line.strip().split())
                  if not clean:
                      continue
                  if not SIGNAL.search(clean):
                      continue
                  key = clean.lower()
                  if key in seen:
                      continue
                  seen.add(key)
                  lines.append(clean)
                  if len(lines) >= 18:
                      break

              if not lines:
                  fallback = [" ".join(x.strip().split()) for x in text.splitlines() if x.strip()]
                  lines = fallback[:6]

              out = [f"[{name}]"]
              out.extend(f"- {x}" for x in lines)
              return out

          payload = "\n".join(
              compact("build_and_test", read_text("build_and_test.log"))
              + [""]
              + compact("valgrind", read_text("valgrind_tests.log"))
          )

          if len(payload) > MAX_CHARS:
              payload = payload[: MAX_CHARS - 20] + "\n...[truncated]"

          Path("ai_context_logs.txt").write_text(payload, encoding="utf-8")
          PY

      - name: Generate AI push summary
        if: always() && github.event_name == 'push'
        env:
          GROQ_API_KEY: ${{ secrets.API }}
          GROQ_MODEL: openai/gpt-oss-20b
          EVENT_PATH: ${{ github.event_path }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          chmod +x ./utility_scripts/groq_push_summary.py
          python3 ./utility_scripts/groq_push_summary.py

      - name: Ensure AI summary files exist
        if: always()
        run: |
          [ -f ai_push_summary.txt ] || echo "AI summary was not generated" > ai_push_summary.txt
          [ -f ai_push_summary.json ] || printf '{"summary":"AI summary was not generated"}\n' > ai_push_summary.json

      - name: Ensure AI context files exist
        if: always() && github.event_name == 'push'
        run: |
          [ -f ai_context_overview.txt ] || touch ai_context_overview.txt
          [ -f ai_context_commits.txt ] || touch ai_context_commits.txt
          [ -f ai_context_changed_files.txt ] || touch ai_context_changed_files.txt
          [ -f ai_context_diff.txt ] || touch ai_context_diff.txt
          [ -f ai_context_logs.txt ] || touch ai_context_logs.txt

      - name: Prepare Discord payload
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          BUILD_TEST_EXIT: ${{ steps.run_build_test.outputs.exit_code }}
          VALGRIND_EXIT: ${{ steps.run_valgrind.outputs.exit_code }}
          EVENT_PATH: ${{ github.event_path }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          python3 - <<'PY'
          import json
          import os

          def read_text(path, default=""):
              try:
                  with open(path, "r", encoding="utf-8", errors="replace") as fh:
                      return fh.read().strip()
              except FileNotFoundError:
                  return default

          def trim_lines(lines, limit):
              out = []
              size = 0
              for line in lines:
                  step = len(line) + 1
                  if size + step > limit:
                      out.append("...[truncated]")
                      break
                  out.append(line)
                  size += step
              return out

          event_path = os.environ["EVENT_PATH"]
          with open(event_path, "r", encoding="utf-8") as fh:
              event = json.load(fh)

          ai_summary = read_text("ai_push_summary.txt", "AI summary unavailable")

          commits = event.get("commits", [])
          commit_lines = []
          for c in commits[:12]:
              cid = (c.get("id") or "")[:7]
              msg = ((c.get("message") or "").splitlines() or [""])[0].strip()
              msg = msg[:90]
              author = c.get("author", {}) if isinstance(c.get("author", {}), dict) else {}
              author_name = author.get("name") or "unknown"
              author_email = author.get("email") or "n/a"
              commit_lines.append(f"- `{cid}` | `{author_name}` <{author_email}> | {msg}")

          if len(commits) > 12:
              commit_lines.append(f"- ... and {len(commits) - 12} more commit(s)")

          status = os.environ["JOB_STATUS"].upper()
          emoji = ":white_check_mark:" if status == "SUCCESS" else ":x:"
          sha_full = os.environ["SHA"]
          sha_short = sha_full[:7]

          repo = os.environ["REPO"]
          ref_name = os.environ["REF_NAME"]
          actor = os.environ["ACTOR"]
          run_id = os.environ["RUN_ID"]
          run_number = os.environ["RUN_NUMBER"]
          server_url = os.environ["SERVER_URL"]
          build_test_exit = os.environ.get("BUILD_TEST_EXIT", "1")
          valgrind_exit = os.environ.get("VALGRIND_EXIT", "1")

          run_url = f"{server_url}/{repo}/actions/runs/{run_id}"
          commit_url = f"{server_url}/{repo}/commit/{sha_full}"
          compare_url = event.get("compare", "")
          overall_label = "SUCCESS" if status == "SUCCESS" else "FAILED"

          summary_lines = [
              f"{emoji} **Push Summary** `{overall_label}`",
              f"Repo: `{repo}` | Branch: `{ref_name}` | Actor: `{actor}`",
              f"Run: [#{run_number}]({run_url}) | Head: [`{sha_short}`]({commit_url})",
              f"Checks: build=`{build_test_exit}` valgrind=`{valgrind_exit}` | Commits: `{len(commits)}`",
          ]

          if compare_url:
              summary_lines.append(f"Compare: {compare_url}")

          if commit_lines:
              summary_lines.append("")
              summary_lines.append("**Commits in push**")
              summary_lines.extend(commit_lines)

          summary_lines.append("")
          summary_lines.append("**AI summary (Groq)**")
          summary_lines.append("```md")
          summary_lines.extend(trim_lines(ai_summary.splitlines(), 1100))
          summary_lines.append("```")

          payload = "\n".join(trim_lines(summary_lines, 1850))
          summary_messages = [{"content": payload}]

          with open("discord_summary_messages.json", "w", encoding="utf-8") as out:
              json.dump(summary_messages, out)
          PY

      - name: Validate Discord webhook
        id: webhook_check
        if: always() && github.event_name == 'push'
        env:
          WEBHOOK: ${{ secrets.WEBHOOK }}
        run: |
          rm -f .discord_webhook_blocked

          if [ -z "$WEBHOOK" ]; then
            echo "WEBHOOK secret is not set; skipping Discord notification."
            echo "should_send=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$WEBHOOK" in
            https://discord.com/api/webhooks/*|https://ptb.discord.com/api/webhooks/*)
              echo "should_send=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "WEBHOOK does not look like a Discord webhook URL; skipping Discord notification."
              echo "should_send=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

      - name: Send Discord summary messages
        if: always() && github.event_name == 'push' && steps.webhook_check.outputs.should_send == 'true'
        env:
          WEBHOOK: ${{ secrets.WEBHOOK }}
          DISCORD_BLOCK_FILE: .discord_webhook_blocked
        run: |
          python3 ./utility_scripts/send_discord_messages.py --webhook "$WEBHOOK" --messages-file discord_summary_messages.json --label summary --max-messages 1 --delay-seconds 1.5 --max-retries 2

      - name: Mark workflow failed if checks failed
        if: always()
        run: |
          if [ "${{ steps.run_build_test.outputs.exit_code }}" != "0" ] || [ "${{ steps.run_valgrind.outputs.exit_code }}" != "0" ]; then
            echo "One or more test protocols failed"
            exit 1
          fi
