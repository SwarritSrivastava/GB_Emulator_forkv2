name: TEST INIT RESPONSE PROTOCOL

on:
  push:

permissions:
  contents: read

concurrency:
  group: test-init-response-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-init-response:
    name: Build, Test, Valgrind, Discord Notify
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Build and run tests
        id: run_build_test
        run: |
          set +e
          chmod +x ./utility_scripts/build_and_test.sh
          ./utility_scripts/build_and_test.sh 2>&1 | tee build_and_test.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run valgrind test protocol
        id: run_valgrind
        if: always()
        run: |
          set +e
          chmod +x ./utility_scripts/valgrind_tests.sh
          sudo ./utility_scripts/valgrind_tests.sh 2>&1 | tee valgrind_tests.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Ensure log files exist
        if: always()
        run: |
          [ -f build_and_test.log ] || echo "build_and_test.log was not generated" > build_and_test.log
          [ -f valgrind_tests.log ] || echo "valgrind_tests.log was not generated" > valgrind_tests.log

      - name: Prepare Discord payload
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          BUILD_TEST_EXIT: ${{ steps.run_build_test.outputs.exit_code }}
          VALGRIND_EXIT: ${{ steps.run_valgrind.outputs.exit_code }}
          EVENT_PATH: ${{ github.event_path }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          python3 - <<'PY'
          import json
          import os

          def read_tail(path, max_lines=40):
              try:
                  with open(path, "r", encoding="utf-8", errors="replace") as fh:
                      lines = fh.read().splitlines()
                  return "\n".join(lines[-max_lines:])
              except FileNotFoundError:
                  return f"{path} not found"

          event_path = os.environ["EVENT_PATH"]
          with open(event_path, "r", encoding="utf-8") as fh:
              event = json.load(fh)

          commits = event.get("commits", [])
          commit_lines = []
          for c in commits[:10]:
              cid = c.get("id", "")[:7]
              msg = (c.get("message", "") or "").splitlines()[0]
              author = c.get("author", {}).get("name", "unknown")
              commit_lines.append(f"- {cid} {msg} ({author})")

          if len(commits) > 10:
              commit_lines.append(f"- ... and {len(commits) - 10} more commits")

          status = os.environ["JOB_STATUS"].upper()
          emoji = ":white_check_mark:" if status == "SUCCESS" else ":x:"
          sha_full = os.environ["SHA"]
          sha_short = sha_full[:7]

          repo = os.environ["REPO"]
          ref_name = os.environ["REF_NAME"]
          actor = os.environ["ACTOR"]
          run_id = os.environ["RUN_ID"]
          run_number = os.environ["RUN_NUMBER"]
          server_url = os.environ["SERVER_URL"]
          build_test_exit = os.environ.get("BUILD_TEST_EXIT", "1")
          valgrind_exit = os.environ.get("VALGRIND_EXIT", "1")

          run_url = f"{server_url}/{repo}/actions/runs/{run_id}"
          commit_url = f"{server_url}/{repo}/commit/{sha_full}"
          compare_url = event.get("compare", "")
          build_tail = read_tail("build_and_test.log")
          valgrind_tail = read_tail("valgrind_tests.log")

          lines = [
              f"{emoji} **TEST INIT RESPONSE PROTOCOL** `{status}`",
              "",
              f"Repository: `{repo}`",
              f"Branch: `{ref_name}`",
              f"Actor: `{actor}`",
              f"Head Commit: [`{sha_short}`]({commit_url})",
              f"Run: [#{run_number}]({run_url})",
          ]

          if compare_url:
              lines.append(f"Compare: {compare_url}")

          lines.append(f"Commit Count In Push: `{len(commits)}`")
          lines.append(f"build_and_test.sh exit: `{build_test_exit}`")
          lines.append(f"valgrind_tests.sh exit: `{valgrind_exit}`")

          if commit_lines:
              lines.append("")
              lines.append("Commits:")
              lines.extend(commit_lines)

          lines.append("")
          lines.append("build_and_test.sh tail:")
          lines.append("```")
          lines.append(build_tail)
          lines.append("```")

          lines.append("")
          lines.append("valgrind_tests.sh tail:")
          lines.append("```")
          lines.append(valgrind_tail)
          lines.append("```")

          content = "\n".join(lines)
          if len(content) > 1800:
              content = content[:1750] + "\n\n...(truncated, see attached logs)"
          payload = {"content": content}

          with open("discord_payload.json", "w", encoding="utf-8") as out:
              json.dump(payload, out)
          PY

      - name: Send Discord notification
        if: always() && github.event_name == 'push'
        env:
          WEBHOOK: ${{ secrets.WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "WEBHOOK secret is not set; skipping Discord notification."
            exit 0
          fi

          case "$WEBHOOK" in
            https://discord.com/api/webhooks/*|https://ptb.discord.com/api/webhooks/*)
              ;;
            *)
              echo "WEBHOOK does not look like a Discord webhook URL; refusing to send."
              exit 1
              ;;
          esac

          payload_json=$(cat discord_payload.json)

          curl --fail --silent --show-error \
            -X POST \
            -F "payload_json=$payload_json" \
            -F "files[0]=@build_and_test.log;type=text/plain" \
            -F "files[1]=@valgrind_tests.log;type=text/plain" \
            "$WEBHOOK"

      - name: Mark workflow failed if checks failed
        if: always()
        run: |
          if [ "${{ steps.run_build_test.outputs.exit_code }}" != "0" ] || [ "${{ steps.run_valgrind.outputs.exit_code }}" != "0" ]; then
            echo "One or more test protocols failed"
            exit 1
          fi
