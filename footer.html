<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: 'dark'
  });
  window.addEventListener('load', function() {
    var fragments = document.querySelectorAll('.fragment');
    fragments.forEach(function(fragment) {
      var lines = fragment.querySelectorAll('.line');
      if (lines.length > 0) {
        var firstLineText = lines[0].textContent.replace(/\u00A0/g, ' ').trim();
        if (firstLineText.startsWith('graph') || firstLineText.startsWith('sequenceDiagram') || firstLineText.startsWith('stateDiagram') || firstLineText.startsWith('classDiagram')) {
          var mermaidText = '';
          lines.forEach(function(line) {
            mermaidText += line.textContent.replace(/\u00A0/g, ' ') + '\n';
          });
          var mermaidDiv = document.createElement('div');
          mermaidDiv.className = 'mermaid';
          mermaidDiv.innerText = mermaidText;
          fragment.parentNode.replaceChild(mermaidDiv, fragment);
        }
      }
    });
    mermaid.init(undefined, document.querySelectorAll('.mermaid'));
  });
</script>
</body>
</html>
